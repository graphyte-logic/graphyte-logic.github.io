<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphyte Logic | Autonomous AI Architectures</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 800px; }
        h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 10px; background: linear-gradient(180deg, #fff 0%, #666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 1.2rem; margin-bottom: 40px; line-height: 1.6; }
        .logo-placeholder { width: 120px; height: 120px; margin-bottom: 30px; border: 1px solid #333; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .btn { border: 1px solid var(--primary); color: var(--primary); padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
        .btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .footer { position: absolute; bottom: 30px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-placeholder" style="border: none; background: transparent;">
            <img src="logo.png" alt="Graphyte Logic Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <h1>Graphyte Logic</h1>
        <p>Progettiamo sistemi autonomi basati su grafi logici e modelli di linguaggio avanzati. <br>Efficienza, automazione, intelligenza.</p>
        <a href="https://github.com/graphyte-logic/ai-newsroom" class="btn">Esplora AI Newsroom</a>
    </div>
    <div class="footer">© 2024 Graphyte Logic | graphytelogic@gmail.com</div>
</body>
</html>
